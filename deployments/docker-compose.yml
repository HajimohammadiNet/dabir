services:
  postgres:
    image: postgres:17-alpine
    container_name: dabir-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-dabir}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dabir_secret}
      POSTGRES_DB: ${DB_NAME:-dabir}
    volumes:
      - dabir_postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-dabir} -d ${DB_NAME:-dabir}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: dabir-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-dabir}
      APP_ENV: ${APP_ENV:-production}
      APP_HOST: 0.0.0.0
      APP_PORT: 8080

      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-dabir}
      DB_PASSWORD: ${DB_PASSWORD:-dabir_secret}
      DB_NAME: ${DB_NAME:-dabir}
      DB_SSLMODE: disable
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-25}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-10}

      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      JWT_ACCESS_TOKEN_TTL_MINUTES: ${JWT_ACCESS_TOKEN_TTL_MINUTES:-60}

      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      CORS_ALLOWED_METHODS: ${CORS_ALLOWED_METHODS:-GET,POST,PATCH,DELETE,OPTIONS}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS:-Accept,Authorization,Content-Type,X-CSRF-Token,X-Request-ID}
    ports:
      - "${API_PORT:-8080}:8080"

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080/api/v1}
    container_name: dabir-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  dabir_postgres_data: