apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dabir.fullname" . }}-config
  labels:
    {{- include "dabir.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.api.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- range $key, $value := .Values.web.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}