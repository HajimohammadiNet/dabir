api:
  replicaCount: 2

  image:
    repository: reg.example.com/dabir/dabir-api
    tag: "v0.1.0"
    pullPolicy: IfNotPresent

  env:
    APP_ENV: production
    APP_HOST: 0.0.0.0
    APP_PORT: "8080"

    DB_HOST: "postgres.internal.example.com"
    DB_PORT: "5432"
    DB_USER: "dabir"
    DB_NAME: "dabir"
    DB_SSLMODE: "disable"

    CORS_ALLOWED_ORIGINS: "https://dabir.example.com"

  secrets:
    create: false
    existingSecret: dabir-secret

web:
  replicaCount: 2

  image:
    repository: reg.example.com/dabir/dabir-web
    tag: "v0.1.0"
    pullPolicy: IfNotPresent

  env:
    NEXT_PUBLIC_API_BASE_URL: "https://dabir.example.com/api/v1"

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "25m"
  hosts:
    - host: dabir.example.com
      paths:
        - path: /
          pathType: Prefix
          service: web
        - path: /api
          pathType: Prefix
          service: api
  tls:
    - secretName: dabir-tls
      hosts:
        - dabir.example.com